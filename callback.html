<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Signing in to Luna...</title></head>
<body>
<p>Signing you in...</p>
<script>
  try {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const user = params.get('user');
    const authError = params.get('auth_error');
    const LUNA = 'https://rolandoluwaseun4.github.io/Luna-AI/';
    if (authError) {
      window.location.replace(LUNA + '?auth_error=true');
    } else if (token && user) {
      localStorage.setItem('luna-token', token);
      localStorage.setItem('luna-user', decodeURIComponent(user));
      window.location.replace(LUNA);
    } else {
      window.location.replace(LUNA);
    }
  } catch(e) {
    window.location.replace('https://rolandoluwaseun4.github.io/Luna-AI/');
  }
</script>
</body>
</html>
