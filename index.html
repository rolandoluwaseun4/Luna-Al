<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Luna</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#000000"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link rel="stylesheet" href="tabs.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      min-height: 100%; background: #000;
      font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff; -webkit-font-smoothing: antialiased;
    }

    .page { max-width: 430px; margin: 0 auto; }

    /* Top bar */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 56px 20px 20px;
    }
    .topbar-greeting { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 3px; }
    .topbar-name { font-size: 25px; font-weight: 700; letter-spacing: -0.4px; }
    .topbar-name em { font-style: normal; color: #a78bfa; }
    .notif-btn {
      width: 38px; height: 38px; border-radius: 12px;
      background: #141414; border: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      text-decoration: none;
    }
    .notif-btn svg { width: 18px; height: 18px; stroke: rgba(255,255,255,0.45); fill: none; stroke-width: 2; stroke-linecap: round; }

    /* Ask pill */
    .ask-pill {
      margin: 0 20px 28px;
      display: flex; align-items: center; gap: 12px;
      background: #141414; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px; padding: 12px 12px 12px 14px;
      cursor: pointer; transition: border-color 0.15s; text-decoration: none;
    }
    .ask-pill:active { border-color: rgba(124,58,237,0.45); }
    .ask-icon { width: 36px; height: 36px; border-radius: 10px; overflow: hidden; flex-shrink: 0; }
    .ask-icon img { width: 100%; height: 100%; object-fit: cover; }
    .ask-text { flex: 1; font-size: 14px; color: rgba(255,255,255,0.32); font-weight: 300; }
    .ask-send {
      width: 34px; height: 34px; border-radius: 50%;
      background: #7c3aed; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .ask-send svg { width: 13px; height: 13px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; }

    /* Section */
    .section { padding: 0 20px; margin-bottom: 28px; }
    .section-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.25); letter-spacing: 1.1px; text-transform: uppercase; }
    .see-all { font-size: 12px; color: #a78bfa; text-decoration: none; }

    /* Quick grid */
    .qgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .qcard {
      background: #141414; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px; padding: 15px; cursor: pointer;
      text-decoration: none; display: flex; flex-direction: column;
      justify-content: space-between; min-height: 88px;
      transition: border-color 0.15s, background 0.15s;
    }
    .qcard:active { background: #1c1c1e; border-color: rgba(124,58,237,0.3); }
    .qcard-icon { width: 30px; height: 30px; border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .qcard-icon svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .qcard p { font-size: 13px; font-weight: 500; color: #fff; }
    .qcard span { font-size: 11px; color: rgba(255,255,255,0.32); }

    /* Recent list */
    .rlist { display: flex; flex-direction: column; }
    .ritem {
      display: flex; align-items: center; gap: 13px;
      padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer; text-decoration: none; transition: opacity 0.12s;
    }
    .ritem:last-child { border-bottom: none; }
    .ritem:active { opacity: 0.55; }
    .ritem-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: #141414; border: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .ritem-icon svg { width: 16px; height: 16px; stroke: rgba(255,255,255,0.4); fill: none; stroke-width: 2; stroke-linecap: round; }
    .ritem-body { flex: 1; min-width: 0; }
    .ritem-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .ritem-preview { font-size: 12px; color: rgba(255,255,255,0.32); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ritem-time { font-size: 11px; color: rgba(255,255,255,0.25); flex-shrink: 0; }

    /* Fade in */
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .s1 { animation: fadeUp 0.25s ease both; }
    .s2 { animation: fadeUp 0.25s 0.06s ease both; }
    .s3 { animation: fadeUp 0.25s 0.12s ease both; }
    .s4 { animation: fadeUp 0.25s 0.18s ease both; }
  </style>
</head>
<body>
<div class="page">

  <div class="topbar s1">
    <div>
      <p class="topbar-greeting" id="greeting">Good morning</p>
      <h1 class="topbar-name">Hello, <em id="uname">there</em></h1>
    </div>
    <a class="notif-btn" href="profile.html">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </a>
  </div>

  <a class="ask-pill s2" href="app.html">
    <div class="ask-icon"><img src="icon-192.png" alt="Luna"/></div>
    <span class="ask-text">Ask Luna anything...</span>
    <div class="ask-send">
      <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
    </div>
  </a>

  <div class="section s3">
    <div class="section-hdr"><span class="section-label">Quick Actions</span></div>
    <div class="qgrid">
      <a class="qcard" href="app.html">
        <div class="qcard-icon" style="background:rgba(124,58,237,0.15)">
          <svg style="stroke:#a78bfa" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div><p>Chat</p><span>Ask anything</span></div>
      </a>
      <a class="qcard" href="create.html">
        <div class="qcard-icon" style="background:rgba(249,115,22,0.12)">
          <svg style="stroke:#fb923c" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </div>
        <div><p>Write</p><span>Essays, emails, more</span></div>
      </a>
      <a class="qcard" href="explore.html">
        <div class="qcard-icon" style="background:rgba(59,130,246,0.12)">
          <svg style="stroke:#60a5fa" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        </div>
        <div><p>Explore</p><span>Prompts and tools</span></div>
      </a>
      <a class="qcard" href="create.html#image">
        <div class="qcard-icon" style="background:rgba(34,197,94,0.12)">
          <svg style="stroke:#4ade80" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
        <div><p>Image</p><span>5 free per day</span></div>
      </a>
    </div>
  </div>

  <div class="section s4">
    <div class="section-hdr">
      <span class="section-label">Recent</span>
      <a class="see-all" href="app.html">See all</a>
    </div>
    <div class="rlist" id="recent-list">
      <div class="ritem" style="opacity:0.3;pointer-events:none">
        <div class="ritem-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
        <div class="ritem-body"><p class="ritem-title">Loading...</p></div>
      </div>
    </div>
  </div>

</div>

<script src="tabs.js"></script>
<script>
  const hr = new Date().getHours();
  document.getElementById('greeting').textContent = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';

  const u = window.lunaUser;
  if (u) document.getElementById('uname').textContent = (u.displayName || u.username || 'there').split(' ')[0];

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function ago(d) {
    const s = (Date.now() - new Date(d)) / 1000;
    if (s < 60) return 'now';
    if (s < 3600) return Math.floor(s/60) + 'm';
    if (s < 86400) return Math.floor(s/3600) + 'h';
    return Math.floor(s/86400) + 'd';
  }

  async function loadRecent() {
    if (!window.lunaUser) return;
    try {
      const res = await fetch(`${window.lunaBackend}/threads/${window.lunaUser.id}`, { headers: window.lunaHeaders() });
      if (!res.ok) return;
      const threads = await res.json();
      const list = document.getElementById('recent-list');
      if (!threads.length) {
        list.innerHTML = `<div class="ritem" style="opacity:0.3;pointer-events:none">
          <div class="ritem-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
          <div class="ritem-body"><p class="ritem-title">No chats yet</p><p class="ritem-preview">Start a conversation with Luna</p></div>
        </div>`;
        return;
      }
      list.innerHTML = threads.slice(0, 5).map(t => `
        <a class="ritem" href="app.html?thread=${t._id}">
          <div class="ritem-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
          <div class="ritem-body">
            <p class="ritem-title">${esc(t.title || 'Chat')}</p>
            <p class="ritem-preview">${esc((t.messages?.[t.messages.length-1]?.text || '').slice(0,60))}</p>
          </div>
          <span class="ritem-time">${ago(t.updatedAt)}</span>
        </a>`).join('');
    } catch(e) {}
  }
  loadRecent();
</script>
</body>
</html>
