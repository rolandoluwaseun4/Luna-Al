<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Explore — Luna</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <link rel="stylesheet" href="tabs.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { min-height: 100%; background: #000; font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif; color: #fff; -webkit-font-smoothing: antialiased; }
    .page { max-width: 430px; margin: 0 auto; padding: 56px 20px 0; }

    .page-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
    .page-sub { font-size: 14px; color: rgba(255,255,255,0.35); font-weight: 300; margin-bottom: 20px; }

    /* Search */
    .search {
      display: flex; align-items: center; gap: 10px;
      background: #141414; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    .search:focus-within { border-color: rgba(124,58,237,0.4); }
    .search svg { width: 16px; height: 16px; stroke: rgba(255,255,255,0.3); fill: none; stroke-width: 2; stroke-linecap: round; flex-shrink: 0; }
    .search input { flex: 1; background: none; border: none; outline: none; font-family: inherit; font-size: 14px; color: #fff; font-weight: 300; }
    .search input::placeholder { color: rgba(255,255,255,0.28); }

    /* Categories */
    .cats { display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 2px; }
    .cats::-webkit-scrollbar { display: none; }
    .cat {
      padding: 7px 16px; border-radius: 100px; font-size: 12px; font-weight: 500;
      border: 1px solid rgba(255,255,255,0.08); background: #141414; color: rgba(255,255,255,0.5);
      white-space: nowrap; cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    }
    .cat.active { background: rgba(124,58,237,0.15); border-color: rgba(124,58,237,0.35); color: #a78bfa; }

    .section-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.25); letter-spacing: 1.1px; text-transform: uppercase; margin-bottom: 14px; }

    /* Prompt cards */
    .plist { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
    .pcard {
      background: #141414; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px; padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .pcard:active { background: #1c1c1e; border-color: rgba(124,58,237,0.3); }
    .pcard-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: #1c1c1e; border: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .pcard-icon svg { width: 17px; height: 17px; stroke: rgba(255,255,255,0.5); fill: none; stroke-width: 2; stroke-linecap: round; }
    .pcard-body { flex: 1; min-width: 0; }
    .pcard-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
    .pcard-desc { font-size: 12px; color: rgba(255,255,255,0.35); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pcard-tag { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 100px; background: #1c1c1e; color: rgba(255,255,255,0.35); border: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; }

    /* Capability grid */
    .cap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
    .cap-card {
      background: #141414; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px; padding: 14px; cursor: pointer;
      transition: border-color 0.15s; display: flex; flex-direction: column; gap: 14px;
    }
    .cap-card:active { border-color: rgba(124,58,237,0.3); background: #1c1c1e; }
    .cap-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .cap-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
    .cap-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .cap-desc { font-size: 11px; color: rgba(255,255,255,0.32); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .s1 { animation: fadeUp 0.25s ease both; }
    .s2 { animation: fadeUp 0.25s 0.06s ease both; }
    .s3 { animation: fadeUp 0.25s 0.12s ease both; }
    .s4 { animation: fadeUp 0.25s 0.18s ease both; }
  </style>
</head>
<body>
<div class="page">
  <h1 class="page-title s1">Explore</h1>
  <p class="page-sub s1">Prompts and things Luna can do.</p>

  <div class="search s2">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" placeholder="Search prompts..." oninput="filterPrompts(this.value)"/>
  </div>

  <div class="cats s2">
    <div class="cat active" onclick="pickCat(this,'all')">All</div>
    <div class="cat" onclick="pickCat(this,'writing')">Writing</div>
    <div class="cat" onclick="pickCat(this,'business')">Business</div>
    <div class="cat" onclick="pickCat(this,'creative')">Creative</div>
    <div class="cat" onclick="pickCat(this,'learning')">Learning</div>
    <div class="cat" onclick="pickCat(this,'fun')">Fun</div>
  </div>

  <p class="section-label s3">Prompts</p>
  <div class="plist s3" id="prompt-list"></div>

  <p class="section-label s4">Luna can also...</p>
  <div class="cap-grid s4">
    <div class="cap-card" onclick="useCap('Search the web for')">
      <div class="cap-icon" style="background:rgba(124,58,237,0.12)">
        <svg style="stroke:#a78bfa" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </div>
      <div><p class="cap-name">Search Web</p><p class="cap-desc">Real-time results</p></div>
    </div>
    <div class="cap-card" onclick="window.location.href='app.html'">
      <div class="cap-icon" style="background:rgba(34,197,94,0.12)">
        <svg style="stroke:#4ade80" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div><p class="cap-name">Read PDFs</p><p class="cap-desc">Upload and analyse</p></div>
    </div>
    <div class="cap-card" onclick="window.location.href='app.html'">
      <div class="cap-icon" style="background:rgba(249,115,22,0.12)">
        <svg style="stroke:#fb923c" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
      </div>
      <div><p class="cap-name">Voice Mode</p><p class="cap-desc">Talk, Luna talks back</p></div>
    </div>
    <div class="cap-card" onclick="useCap('[deep think]')">
      <div class="cap-icon" style="background:rgba(59,130,246,0.12)">
        <svg style="stroke:#60a5fa" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      </div>
      <div><p class="cap-name">Deep Think</p><p class="cap-desc">Complex reasoning</p></div>
    </div>
  </div>
</div>

<script src="tabs.js"></script>
<script>
  const ALL_PROMPTS = [
    { title:'Analyze my business idea', desc:'Get honest feedback on your concept', tag:'business', prompt:'Analyze my business idea and give me honest feedback:' },
    { title:'Viral tweet thread', desc:'Write a thread that gets engagement', tag:'writing', prompt:'Write a viral tweet thread about' },
    { title:'Teach me anything', desc:'Simple clear explanation of any topic', tag:'learning', prompt:'Teach me about' },
    { title:'Roast me', desc:'Fun roast based on your job or hobby', tag:'fun', prompt:'Roast me based on my job:' },
    { title:'Professional email', desc:'Quick polished email for any situation', tag:'writing', prompt:'Write a professional email to' },
    { title:'Workout plan', desc:'Custom fitness plan for your goals', tag:'learning', prompt:'Give me a complete workout plan for' },
    { title:'Explain like I am 10', desc:'Make complex things simple', tag:'learning', prompt:'Explain this to me like I am 10 years old:' },
    { title:'Debate both sides', desc:'Arguments for and against any topic', tag:'learning', prompt:'Debate both sides of this topic:' },
    { title:'Write a rap', desc:'Bars about anything you want', tag:'creative', prompt:'Write a rap about' },
    { title:'Startup name ideas', desc:'Catchy names for your business', tag:'business', prompt:'Give me startup name ideas for a business that' },
    { title:'Cover letter', desc:'Job application letters that work', tag:'writing', prompt:'Write a cover letter for a position at' },
    { title:'Motivational speech', desc:'Fire yourself up for anything', tag:'fun', prompt:'Give me an epic motivational speech about' },
  ];

  let currentCat = 'all';

  function renderPrompts(prompts) {
    const list = document.getElementById('prompt-list');
    if (!prompts.length) {
      list.innerHTML = `<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3);font-size:14px">No prompts found</div>`;
      return;
    }
    list.innerHTML = prompts.map(p => `
      <div class="pcard" onclick="usePrompt('${escAttr(p.prompt)}')">
        <div class="pcard-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="pcard-body">
          <p class="pcard-title">${esc(p.title)}</p>
          <p class="pcard-desc">${esc(p.desc)}</p>
        </div>
        <div class="pcard-tag">${esc(p.tag)}</div>
      </div>`).join('');
  }

  function pickCat(el, cat) {
    document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    currentCat = cat;
    filterPrompts(document.getElementById('search-input').value);
  }

  function filterPrompts(query) {
    let filtered = ALL_PROMPTS;
    if (currentCat !== 'all') filtered = filtered.filter(p => p.tag === currentCat);
    if (query.trim()) {
      const q = query.toLowerCase();
      filtered = filtered.filter(p => p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q));
    }
    renderPrompts(filtered);
  }

  function usePrompt(prompt) {
    localStorage.setItem('luna-prefill', prompt);
    window.location.href = 'app.html';
  }

  function useCap(prompt) {
    localStorage.setItem('luna-prefill', prompt);
    window.location.href = 'app.html';
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escAttr(s) { return String(s).replace(/'/g,"\\'"); }

  renderPrompts(ALL_PROMPTS);
</script>
</body>
</html>
